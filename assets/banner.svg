<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#67e8f9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.07" stroke="#7c3aed" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <!-- Figma node (left) -->
  <g transform="translate(180, 100)" filter="url(#glow)">
    <!-- Figma-style component icon -->
    <rect x="-36" y="-36" width="72" height="72" rx="12" fill="#7c3aed" opacity="0.15"/>
    <rect x="-36" y="-36" width="72" height="72" rx="12" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <!-- Figma F logo simplified -->
    <rect x="-14" y="-20" width="28" height="8" rx="4" fill="#a78bfa"/>
    <rect x="-14" y="-6" width="20" height="8" rx="4" fill="#a78bfa"/>
    <rect x="-14" y="8" width="28" height="8" rx="4" fill="#a78bfa"/>
    <text x="0" y="60" text-anchor="middle" fill="#7c3aed" font-size="13" font-family="monospace" opacity="0.9">Figma</text>
  </g>

  <!-- Bridge / connector in the middle -->
  <!-- Connection line -->
  <line x1="252" y1="160" x2="500" y2="160" stroke="url(#bridgeGrad)" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.7"/>

  <!-- Bridge arch -->
  <g transform="translate(500, 90)">
    <!-- Arch frame -->
    <rect x="-60" y="0" width="280" height="140" rx="16" fill="#0f0f1a" stroke="url(#bridgeGrad)" stroke-width="2"/>
    <!-- Bridge icon -->
    <path d="M 0,90 L 0,50 Q 80,10 160,50 L 160,90" stroke="url(#bridgeGrad)" stroke-width="3" fill="none" filter="url(#glow)"/>
    <!-- Pillars -->
    <line x1="20" y1="50" x2="20" y2="90" stroke="url(#bridgeGrad)" stroke-width="3" filter="url(#glow)"/>
    <line x1="80" y1="25" x2="80" y2="90" stroke="url(#bridgeGrad)" stroke-width="3" filter="url(#glow)"/>
    <line x1="140" y1="25" x2="140" y2="90" stroke="url(#bridgeGrad)" stroke-width="3" filter="url(#glow)"/>
    <!-- Dot at peak -->
    <circle cx="80" cy="22" r="5" fill="#06b6d4" filter="url(#softGlow)"/>
    <circle cx="140" cy="22" r="5" fill="#7c3aed" filter="url(#softGlow)"/>
    <text x="80" y="120" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="monospace">MCP Bridge</text>
  </g>

  <!-- Connection line right -->
  <line x1="720" y1="160" x2="980" y2="160" stroke="url(#bridgeGrad)" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.7"/>

  <!-- Claude node (right) -->
  <g transform="translate(1050, 100)" filter="url(#glow)">
    <circle cx="0" cy="0" r="44" fill="#06b6d4" opacity="0.1"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <!-- Claude orb / AI symbol -->
    <circle cx="0" cy="0" r="18" fill="#0e7490" opacity="0.5"/>
    <circle cx="0" cy="0" r="12" fill="#06b6d4" opacity="0.8"/>
    <circle cx="0" cy="0" r="5" fill="#e0f2fe"/>
    <!-- Orbit ring -->
    <ellipse cx="0" cy="0" rx="30" ry="10" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.5" transform="rotate(30)"/>
    <text x="0" y="60" text-anchor="middle" fill="#06b6d4" font-size="13" font-family="monospace" opacity="0.9">Claude Code</text>
  </g>

  <!-- Title text -->
  <text x="640" y="270" text-anchor="middle" font-size="36" font-weight="bold" font-family="'Segoe UI', system-ui, sans-serif" fill="url(#textGrad)" filter="url(#glow)">Figma MCP Bridge</text>
  <text x="640" y="300" text-anchor="middle" font-size="15" font-family="monospace" fill="#64748b">Connect Figma to Claude Code via Model Context Protocol</text>
</svg>
